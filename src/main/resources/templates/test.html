<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .upload-section {
            padding: 40px 30px;
            text-align: center;
            background: #f8f9fa;
        }
        
        .upload-section h2 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        #imageInput {
            display: none;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 15px 30px;
            background: white;
            border: 2px dashed #3498db;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #3498db;
        }
        
        .file-input-label:hover {
            background: #f0f8ff;
            border-color: #2980b9;
            transform: translateY(-2px);
        }
        
        .analyze-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .analyze-btn:active {
            transform: translateY(0);
        }
        
        .drop-zone {
            border: 3px dashed #3498db;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            background: #f8f9fa;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .drop-zone:hover {
            border-color: #2980b9;
            background: #f0f8ff;
            transform: translateY(-2px);
        }
        
        .drop-zone.drag-over {
            border-color: #27ae60;
            background: #e8f8f5;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(39, 174, 96, 0.2);
        }
        
        .drop-zone-content {
            pointer-events: none;
        }
        
        .drop-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .drop-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .drop-subtext {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        
        .file-input-wrapper {
            pointer-events: auto;
        }
        
        .analyze-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .analyze-btn:disabled:hover {
            background: #bdc3c7;
            transform: none;
            box-shadow: none;
        }
        
        .file-preview {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 2px solid #3498db;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .file-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .file-preview-info {
            flex: 1;
        }
        
        .file-preview-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .file-preview-size {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        .remove-file {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }
        
        .remove-file:hover {
            background: #c0392b;
        }
        
        .results-section {
            padding: 30px;
            display: none;
        }
        
        .results-section.active {
            display: block;
        }
        
        .product-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .product-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px 30px;
        }
        
        .product-header h4 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .product-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .product-info p {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        
        .product-info strong {
            display: block;
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .section-title {
            color: #2c3e50;
            font-size: 1.4rem;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
            font-weight: 600;
        }
        
        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .score-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .score-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .score-label {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .nutrition-list {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .nutrition-list ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .nutrition-list li {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .nutrition-list li:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        
        .nutrition-list strong {
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .nutrition-value {
            font-size: 1.1rem;
            color: #3498db;
            font-weight: 700;
        }
        
        .product-meta {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .meta-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #9b59b6;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .meta-item strong {
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .meta-value {
            color: #9b59b6;
            font-weight: 600;
        }
        
        .ingredients-text {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-style: italic;
            color: #856404;
        }
        
        .ingredients-text strong {
            color: #856404;
            display: block;
            margin-bottom: 8px;
            font-style: normal;
        }
        
        .ingredients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .ingredient-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #ddd;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .ingredient-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        
        .ingredient-card.low-risk {
            border-left-color: #27ae60;
        }
        
        .ingredient-card.medium-risk {
            border-left-color: #f39c12;
        }
        
        .ingredient-card.high-risk {
            border-left-color: #e74c3c;
        }
        
        .ingredient-card h6 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .ingredient-card.low-risk h6 {
            color: #27ae60;
        }
        
        .ingredient-card.medium-risk h6 {
            color: #f39c12;
        }
        
        .ingredient-card.high-risk h6 {
            color: #e74c3c;
        }
        
        .ingredient-card p {
            margin-bottom: 10px;
            color: #555;
        }
        
        .ingredient-card strong {
            color: #2c3e50;
        }
        
        .risk-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }
        
        .risk-badge.low {
            background: #27ae60;
        }
        
        .risk-badge.medium {
            background: #f39c12;
        }
        
        .risk-badge.high {
            background: #e74c3c;
        }
        
        .impact-score {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #ecf0f1;
            color: #2c3e50;
        }
        
        .ingredient-description {
            font-style: italic;
            color: #7f8c8d;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ecf0f1;
        }
        
        .images-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .images-gallery img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .images-gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .error-message {
            background: #e74c3c;
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .header, .upload-section, .results-section {
                padding: 20px;
            }
            
            .product-info {
                grid-template-columns: 1fr;
            }
            
            .scores-grid {
                grid-template-columns: 1fr;
            }
            
            .nutrition-list ul {
                grid-template-columns: 1fr;
            }
            
            .ingredients-grid {
                grid-template-columns: 1fr;
            }
            
            .images-gallery img {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍎 NutriScan</h1>
            <p>AI-Powered Food Analysis & Nutrition Insights</p>
        </div>
        
        <div class="upload-section">
            <h2>Upload Food Image</h2>
            <div id="dropZone" class="drop-zone">
                <div class="drop-zone-content">
                    <div class="drop-icon">📸</div>
                    <p class="drop-text">Drag & drop your food image here</p>
                    <p class="drop-subtext">or</p>
                    <div class="file-input-wrapper">
                        <label for="imageInput" class="file-input-label">
                            📷 Choose Image File
                        </label>
                        <input type="file" id="imageInput" accept="image/*">
                    </div>
                </div>
            </div>
            <button class="analyze-btn" onclick="uploadImage()" id="analyzeBtn" disabled>
                🔬 Analyze Food
            </button>
        </div>

        <div id="result" class="results-section">
            <div id="productInfo"></div>
        </div>
    </div>

    <script>

        // Drag and drop functionality
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('imageInput');
        const analyzeBtn = document.getElementById('analyzeBtn');

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        // Highlight drop zone when item is dragged over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        // Handle dropped files
        dropZone.addEventListener('drop', handleDrop, false);
        
        // Handle file selection
        fileInput.addEventListener('change', handleFileSelect, false);

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function highlight(e) {
            dropZone.classList.add('drag-over');
        }

        function unhighlight(e) {
            dropZone.classList.remove('drag-over');
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                
                // Check if file is an image
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file');
                    return;
                }
                
                // Check file size (limit to 10MB)
                if (file.size > 10 * 1024 * 1024) {
                    alert('File size must be less than 10MB');
                    return;
                }
                
                // Update file input
                fileInput.files = files;
                
                // Show file preview
                showFilePreview(file);
                
                // Enable analyze button
                analyzeBtn.disabled = false;
            }
        }

        function showFilePreview(file) {
            // Remove existing preview if any
            const existingPreview = dropZone.querySelector('.file-preview');
            if (existingPreview) {
                existingPreview.remove();
            }
            
            // Create preview element
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.createElement('div');
                preview.className = 'file-preview';
                preview.innerHTML = `
                    <img src="${e.target.result}" alt="Preview">
                    <div class="file-preview-info">
                        <div class="file-preview-name">${file.name}</div>
                        <div class="file-preview-size">${formatFileSize(file.size)}</div>
                    </div>
                    <button class="remove-file" onclick="removeFile()">Remove</button>
                `;
                dropZone.appendChild(preview);
            };
            reader.readAsDataURL(file);
        }

        function removeFile() {
            // Clear file input
            fileInput.value = '';
            
            // Remove preview
            const preview = dropZone.querySelector('.file-preview');
            if (preview) {
                preview.remove();
            }
            
            // Disable analyze button
            analyzeBtn.disabled = true;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function uploadImage() {
            const file = fileInput.files[0];

            if (!file) {
                alert("Select an image");
                return;
            }

            // Disable button during upload
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '🔄 Analyzing...';

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch(
                    "http://localhost:8080/api/v1/analysis/image",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                displayProductInfo(result);

            } catch (error) {
                console.error(error);
                alert("Upload failed: " + error.message);
            } finally {
                // Re-enable button
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = '🔬 Analyze Food';
            }
        }

        function displayProductInfo(product) {
            const resultDiv = document.getElementById("result");
            const productInfoDiv = document.getElementById("productInfo");
            console.log(product);
            resultDiv.classList.add('active');
            
            // Check if product exists and has required properties
            if (!product || typeof product !== 'object') {
                productInfoDiv.innerHTML = '<div class="error-message">❌ Invalid product data received</div>';
                return;
            }
            
            // Extract product details from nested structure
            const productDetails = product.product_details || product;
            
            let html = `
                <div class="product-card">
                    <div class="product-header">
                        <h4>${productDetails.productName || 'Unknown Product'}</h4>
                        <div class="product-info">
                            <p><strong>Brand</strong> ${productDetails.brand || 'N/A'}</p>
                            <p><strong>Category</strong> ${productDetails.category || 'N/A'}</p>
                            <p><strong>Price</strong> ₹${productDetails.price || 'N/A'}</p>
                            <p><strong>Source</strong> ${productDetails.source || 'N/A'}</p>
                        </div>
                    </div>
                    <div style="padding: 30px;">`;
            
            // Add ingredients text if available
            if (productDetails.ingredientsText) {
                html += `
                        <div class="ingredients-text">
                            <strong>📝 Ingredients List:</strong>
                            ${productDetails.ingredientsText}
                        </div>`;
            }
            
            // Add product metadata
            html += `
                        <div class="product-meta">
                            <h5 class="section-title">📋 Product Information</h5>
                            <div class="meta-grid">
                                <div class="meta-item">
                                    <strong>Product ID</strong>
                                    <div class="meta-value">${productDetails.id || 'N/A'}</div>
                                </div>
                                <div class="meta-item">
                                    <strong>Barcode</strong>
                                    <div class="meta-value">${productDetails.barcode || 'N/A'}</div>
                                </div>
                                <div class="meta-item">
                                    <strong>Created</strong>
                                    <div class="meta-value">${productDetails.createdAt ? new Date(productDetails.createdAt).toLocaleDateString() : 'N/A'}</div>
                                </div>
                                <div class="meta-item">
                                    <strong>Updated</strong>
                                    <div class="meta-value">${productDetails.updatedAt ? new Date(productDetails.updatedAt).toLocaleDateString() : 'N/A'}</div>
                                </div>
                            </div>
                        </div>`;
            
            // Add scores if available
            if (product.ingredientScore !== undefined || product.nutrientScore !== undefined) {
                html += `
                        <h5 class="section-title">📊 Health Scores</h5>
                        <div class="scores-grid">`;
                
                if (product.ingredientScore !== undefined) {
                    html += `
                            <div class="score-card">
                                <div class="score-value">${product.ingredientScore}</div>
                                <div class="score-label">Ingredient Score</div>
                            </div>`;
                }
                
                if (product.nutrientScore !== undefined) {
                    html += `
                            <div class="score-card">
                                <div class="score-value">${product.nutrientScore}</div>
                                <div class="score-label">Nutrient Score</div>
                            </div>`;
                }
                
                html += `</div>`;
            }
            
            // Add nutrition facts if available
            if (productDetails.nutritionFact && typeof productDetails.nutritionFact === 'object') {
                html += `
                        <h5 class="section-title">🥗 Nutrition Facts${productDetails.nutritionFact.serving_size ? ` (per ${productDetails.nutritionFact.serving_size})` : ''}</h5>
                        <div class="nutrition-list">
                            <ul>`;
            
                // Display all non-null nutrition values
                const nutritionLabels = {
                energy_kcal: { label: 'Energy', unit: 'kcal' },
                protein_g: { label: 'Protein', unit: 'g' },
                carbohydrates_g: { label: 'Carbohydrates', unit: 'g' },
                fat_g: { label: 'Total Fat', unit: 'g' },
                saturated_fat_g: { label: 'Saturated Fat', unit: 'g' },
                trans_fat_g: { label: 'Trans Fat', unit: 'g' },
                monounsaturated_fat_g: { label: 'Monounsaturated Fat', unit: 'g' },
                polyunsaturated_fat_g: { label: 'Polyunsaturated Fat', unit: 'g' },
                cholesterol_mg: { label: 'Cholesterol', unit: 'mg' },
                sodium_mg: { label: 'Sodium', unit: 'mg' },
                potassium_mg: { label: 'Potassium', unit: 'mg' },
                fiber_g: { label: 'Dietary Fiber', unit: 'g' },
                sugars_g: { label: 'Sugars', unit: 'g' },
                added_sugars_g: { label: 'Added Sugars', unit: 'g' },
                calcium_mg: { label: 'Calcium', unit: 'mg' },
                iron_mg: { label: 'Iron', unit: 'mg' },
                vitamin_a: { label: 'Vitamin A', unit: '' },
                vitamin_b12: { label: 'Vitamin B12', unit: '' },
                vitamin_c: { label: 'Vitamin C', unit: '' },
                vitamin_d: { label: 'Vitamin D', unit: '' },
                caffeine_mg: { label: 'Caffeine', unit: 'mg' }
            };
            
                for (const [key, value] of Object.entries(productDetails.nutritionFact)) {
                    if (value !== null && value !== undefined && nutritionLabels[key]) {
                        const label = nutritionLabels[key].label;
                        const unit = nutritionLabels[key].unit;
                        html += `<li><strong>${label}:</strong> <span class="nutrition-value">${value}${unit}</span></li>`;
                    }
                }
                
                html += `</ul>
                        </div>`;
            }
            
            // Add ingredients analysis if available
            if (productDetails.ingredients && Array.isArray(productDetails.ingredients)) {
                html += `
                        <h5 class="section-title">🧪 Ingredients Analysis</h5>
                        <div class="ingredients-grid">
                `;
                
                productDetails.ingredients.forEach(ingredient => {
                    if (ingredient && typeof ingredient === 'object') {
                        const riskClass = ingredient.riskLevel === 'high' ? 'high-risk' : 
                                        ingredient.riskLevel === 'medium' ? 'medium-risk' : 'low-risk';
                        html += `
                            <div class="ingredient-card ${riskClass}">
                                <h6>${ingredient.name || 'Unknown Ingredient'}</h6>
                                <p><strong>Category:</strong> ${ingredient.category || 'N/A'}</p>
                                <p><strong>Risk Level:</strong> <span class="risk-badge ${ingredient.riskLevel || 'low'}">${ingredient.riskLevel || 'N/A'}</span></p>
                                <p><strong>Impact Score:</strong> <span class="impact-score">${ingredient.impactScore || 'N/A'}</span></p>
                                <p class="ingredient-description">${ingredient.description || 'No description available'}</p>
                            </div>
                        `;
                    }
                });
                
                html += `
                        </div>`;
            }
            
            // Add product images if available
            if (productDetails.productImage && Array.isArray(productDetails.productImage)) {
                html += `
                        <h5 class="section-title">📸 Product Images</h5>
                        <div class="images-gallery">
                `;
                
                productDetails.productImage.forEach(image => {
                    if (image && image.imageUrl) {
                        html += `<img src="${image.imageUrl}" alt="Product image" onclick="window.open('${image.imageUrl}', '_blank')">`;
                    }
                });
                
                html += `
                        </div>`;
            }
            
            html += `
                    </div>
                </div>
            `;
            
            productInfoDiv.innerHTML = html;
        }

    </script>

</body>
</html>
